{% extends "base.html" %}
{% block title %}알림 인박스{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-4">
    <h1 class="text-xl font-bold">알림 인박스</h1>
    <select id="aud" onchange="load()" class="border rounded px-2 py-1 text-sm">
        <option value="">전체</option>
        <option value="worker">근로자</option>
        <option value="owner">사업주</option>
        <option value="supervisor">감독관</option>
        <option value="system">시스템</option>
    </select>
</div>

<section class="space-y-2" id="notify-list"></section>

<script>
const SEV = {
    info: 'border-slate-300 bg-white',
    warning: 'border-amber-300 bg-amber-50',
    critical: 'border-rose-300 bg-rose-50',
};
const SEV_ICON = { info: 'ℹ️', warning: '⚠', critical: '🚨' };
const AUD = { worker: '근로자', owner: '사업주', supervisor: '감독관', system: '시스템' };

async function load() {
    const aud = document.getElementById('aud').value;
    const url = aud ? `/api/notifications?audience=${aud}` : '/api/notifications';
    const list = await fetch(url).then(r => r.json());
    document.getElementById('notify-list').innerHTML = list.length ? list.map(n => `
        <div class="border rounded-lg p-3 ${SEV[n.severity] || ''} ${n.read ? 'opacity-60' : ''}">
            <div class="flex justify-between items-start">
                <div>
                    <span>${SEV_ICON[n.severity] || ''}</span>
                    <span class="text-xs font-semibold text-slate-700 ml-1">${AUD[n.audience] || n.audience}</span>
                    <span class="font-medium ml-2">${n.title}</span>
                </div>
                <span class="text-xs text-slate-500">${(n.created_at || '').slice(11,16)}</span>
            </div>
            <div class="text-sm text-slate-700 mt-1">${n.body}</div>
            <div class="mt-2 flex gap-2">
                ${n.link ? `<a href="${n.link}" class="text-xs text-blue-600 underline">바로가기</a>` : ''}
                ${!n.read ? `<button onclick="markRead(${n.id})" class="text-xs text-slate-500 underline">읽음 처리</button>` : ''}
            </div>
        </div>
    `).join('') : '<div class="text-center text-slate-400 py-12">알림이 없습니다</div>';
}

async function markRead(id) {
    await fetch(`/api/notifications/${id}/read`, {method: 'POST'});
    load();
}
load();
</script>
{% endblock %}
