{% extends "base.html" %}
{% block title %}공개 신고 집계{% endblock %}
{% block content %}

<header class="mb-5">
    <h1 class="text-2xl font-extrabold tracking-tight">📣 공개 신고 집계 — 사업장별 신뢰도·누적 현황</h1>
    <p class="text-sm text-slate-600 mt-2">
        신고자 개인정보·증빙은 본인+감독관만 열람. 사업장명은
        <b>신뢰도 60점 이상 또는 서로 다른 신고자 2명 이상</b>일 때만 전체 공개,
        그 외 마스킹 처리.
    </p>
</header>

<!-- 요약 카드 -->
<div id="summary-row" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5"></div>

<!-- 사업장 카드 목록 -->
<div id="company-cards" class="space-y-3">
    <div class="text-slate-400 text-sm py-6 text-center">로드 중…</div>
</div>

<script>
async function load() {
    const list = await fetch('/api/cases/_public/by-company').then(r => r.json());

    const total     = list.reduce((s, r) => s + r.n_reports, 0);
    const public_n  = list.filter(r => r.publicly_listed).length;
    const masked_n  = list.filter(r => !r.publicly_listed).length;
    const max_trust = Math.max(...list.map(r => r.trust_score), 1);

    // 요약 카드
    document.getElementById('summary-row').innerHTML = [
        ['총 신고 건수', total + '건', 'rose'],
        ['공개 사업장', public_n + '개', 'rose'],
        ['관찰 중 (마스킹)', masked_n + '개', 'amber'],
        ['최고 신뢰도', max_trust + '점', 'emerald'],
    ].map(([label, val, color]) => `
        <div class="card border-${color}-200 bg-${color}-50 text-center py-3">
            <div class="text-2xl font-extrabold text-${color}-700 mono">${val}</div>
            <div class="text-xs text-${color}-600 mt-1">${label}</div>
        </div>`).join('');

    if (!list.length) {
        document.getElementById('company-cards').innerHTML =
            '<div class="card text-slate-400 text-sm py-8 text-center">신고 데이터 없음</div>';
        return;
    }

    document.getElementById('company-cards').innerHTML = list.map(r => {
        const pct  = Math.round(r.trust_score);
        const bar  = r.trust_score >= 60 ? 'bg-rose-500' : r.trust_score >= 30 ? 'bg-amber-400' : 'bg-slate-300';
        const badge = r.publicly_listed
            ? '<span class="text-[11px] font-bold bg-rose-100 text-rose-700 px-2 py-0.5 rounded-full">⚠ 공개</span>'
            : '<span class="text-[11px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">마스킹</span>';
        const threshold60 = r.trust_score >= 60;
        const repBadge = r.distinct_reporters >= 2
            ? `<span class="text-[11px] bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full">신고자 ${r.distinct_reporters}명 확인</span>`
            : `<span class="text-[11px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">신고자 ${r.distinct_reporters}명</span>`;

        return `
        <div class="card border-l-4 ${r.publicly_listed ? 'border-rose-400' : 'border-slate-200'}">
            <div class="flex items-start justify-between gap-3 flex-wrap">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 flex-wrap mb-1">
                        <span class="font-bold text-base ${r.publicly_listed ? 'text-slate-900' : 'text-slate-500'}">${r.publicly_listed ? r.company : maskBiz(r.company)}</span>
                        ${badge}
                        ${repBadge}
                    </div>
                    <div class="text-xs text-slate-500">
                        최초 신고 ${(r.first_at||'').slice(0,10)}
                        ${r.first_at !== r.last_at ? ' · 최근 ' + (r.last_at||'').slice(0,10) : ''}
                        · 누적 ${r.n_reports}건
                    </div>
                </div>
                <div class="text-right flex-shrink-0">
                    <div class="text-2xl font-extrabold mono ${r.trust_score >= 60 ? 'text-rose-700' : r.trust_score >= 30 ? 'text-amber-600' : 'text-slate-400'}">${r.trust_score}</div>
                    <div class="text-[10px] text-slate-400">신뢰도 점수</div>
                </div>
            </div>
            <!-- 신뢰도 진행바 -->
            <div class="mt-3">
                <div class="flex items-center justify-between text-[10px] text-slate-400 mb-1">
                    <span>신뢰도 누적</span>
                    <span>${threshold60 ? '✓ 공개 임계 도달' : '공개 기준 60점 미달'}</span>
                </div>
                <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div class="${bar} h-2 rounded-full transition-all duration-700"
                         style="width:${Math.min(100, pct)}%"></div>
                </div>
                <div class="flex justify-between text-[9px] text-slate-300 mt-0.5">
                    <span>0</span>
                    <span class="text-slate-400 font-semibold">60 공개↑</span>
                    <span>100</span>
                </div>
            </div>
            <!-- 신뢰도 구성 -->
            <div class="mt-2 flex gap-3 text-[11px] text-slate-500 flex-wrap">
                ${r.distinct_reporters > 0
                    ? `<span>👤 신고자 ${r.distinct_reporters}명 × 30점</span>`
                    : `<span class="text-slate-400">👤 익명 신고 (연락처 미제공)</span>`}
                <span>📅 복수일 신고 × 15점</span>
                <span>📋 총 ${r.n_reports}건 × 5점</span>
            </div>
        </div>`;
    }).join('');
}
load();
</script>
{% endblock %}
